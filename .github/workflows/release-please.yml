name: release-please

# Conventional-commit driven releases. On each push to main, release-please
# maintains a "release PR" that bumps the version + CHANGELOG from commit
# messages. Merging that PR tags the release and creates the GitHub Release.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Folded in from notify-marketplace.yml. A Release created with the default
      # GITHUB_TOKEN does NOT emit a release:published event, so the old separate
      # workflow would never fire. Dispatch directly here, gated on release_created.
      - name: Notify claude-plugins marketplace
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_SYNC_TOKEN }}
        run: |
          gh api repos/7xuanlu/claude-plugins/dispatches \
            -f event_type=plugin-released \
            -F "client_payload[plugin]=boule" \
            -F "client_payload[tag]=${{ steps.release.outputs.tag_name }}"
