name: test-marketplace-dispatch

# TEMPORARY: validates that MARKETPLACE_SYNC_TOKEN can POST a repository_dispatch
# to claude-plugins. Job succeeds (204) if the token is correctly scoped, fails
# (403) otherwise. Remove after validating.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch with MARKETPLACE_SYNC_TOKEN
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_SYNC_TOKEN }}
        run: |
          gh api repos/7xuanlu/claude-plugins/dispatches \
            -f event_type=plugin-released \
            -F "client_payload[plugin]=boule" \
            -F "client_payload[tag]=v0.1.1"
